
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true #se registra en el servidor de Eureka

# Configuración de seguridad para el API Gateway
aprint:    
  security:
  oauth2:
    resourceserver:
      jwt:
        issuer-uri: http://localhost:8080/realms/ecommerce-realm

server:
  port: 9000
  error:
    include-message: always
    include-stacktrace: never